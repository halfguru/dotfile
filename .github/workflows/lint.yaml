name: Lint

on:
  push:
    branches: [master, main]
    paths:
      - '**.yaml'
      - '**.yml'
  pull_request:
    branches: [master, main]
    paths:
      - '**.yaml'
      - '**.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.'
          config_data: |
            extends: default
            rules:
              line-length:
                max: 120
              document-start: disable
              truthy: disable
